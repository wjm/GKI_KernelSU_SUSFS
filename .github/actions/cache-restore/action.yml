name: 'Restore Cache'
description: 'Restores cache from GitHub Releases.'

inputs:
  cache_path:
    description: 'Path where cache should be restored'
    required: true
    type: string
  cache_key:
    description: 'Primary key to restore cache'
    required: true
    type: string
  cache_bucket:
    description: 'The tag name for the release (e.g., general-cache)'
    required: false
    default: 'general-cache'

outputs:
  cache-hit:
    description: 'Returns "true" if a cache was found and restored, otherwise "false"'
    value: ${{ steps.restore.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Detect and Download Cache
      id: restore
      shell: bash
      env:
        TARGET_REPO: "${{ github.repository }}"
      run: |
        set -euo pipefail

        cd "$GITHUB_WORKSPACE"

        TAG_NAME="${{ inputs.cache_bucket }}"
        BASE_URL="https://github.com/${TARGET_REPO}/releases/download/$TAG_NAME"

        echo "Searching for cache: ${{ inputs.cache_key }}"

        CACHE_FILE="cache-${{ inputs.cache_key }}.tar.zst"

        echo "Downloading cache..."
        if curl -sL --fail -o "$CACHE_FILE" "$BASE_URL/$CACHE_FILE"; then
          if [ -s "$CACHE_FILE" ]; then
            echo "Cache found! Extracting to ${{ inputs.cache_path }}..."
            cd "$(dirname "${{ inputs.cache_path }}")"
            tar -I zstd -xf "$GITHUB_WORKSPACE/$CACHE_FILE"
            rm -f "$GITHUB_WORKSPACE/$CACHE_FILE"
            echo "cache-hit=true" >> "$GITHUB_OUTPUT"
            echo "Cache restored successfully!"
          else
            echo "Cache file is empty, skipping..."
            rm -f "$CACHE_FILE"
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "No cache found for key: ${{ inputs.cache_key }}"
          rm -f "$CACHE_FILE"
          echo "cache-hit=false" >> "$GITHUB_OUTPUT"
        fi
