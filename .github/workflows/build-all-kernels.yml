name: Build All Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'SukiSU 版本'
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
        default: Stable(标准)
      kernelsu_commit:
        description: '指定 SukiSU commit hash (可选，留空使用最新)'
        required: false
        type: string
        default: ''
      susfs_commit:
        description: '指定 SUSFS commit hash 或相对偏移 (如 HEAD~1)'
        required: false
        type: string
        default: ''
      use_zram:
        description: '启用 ZRAM (LZ4KD)'
        required: true
        type: boolean
        default: false
      use_kpm:
        description: '启用 KPM'
        required: true
        type: boolean
        default: true
      BBG:
        description: '启用 Baseband-guard'
        required: true
        type: boolean
        default: false
      make_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true
      custom_version:
        description: '自定义版本名称 (可选)'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.10'
  KSU_VERSION: ${{ github.event.inputs.kernelsu_version }}
  KSU_COMMIT: ${{ github.event.inputs.kernelsu_commit }}
  SUSFS_COMMIT: ${{ github.event.inputs.susfs_commit }}
  USE_ZRAM: ${{ github.event.inputs.use_zram }}
  USE_KPM: ${{ github.event.inputs.use_kpm }}
  USE_BBG: ${{ github.event.inputs.BBG }}
  MAKE_RELEASE: ${{ github.event.inputs.make_release }}
  CUSTOM_VERSION: ${{ github.event.inputs.custom_version }}

jobs:
  build-android12-5-10:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "136"
            os_patch_level: "2022-11"
            revision: "r15"
          - sub_level: "198"
            os_patch_level: "2024-01"
            revision: "r17"
          - sub_level: "209"
            os_patch_level: "2024-05"
            revision: "r13"
          - sub_level: "236"
            os_patch_level: "2025-05"
            revision: "r1"
          - sub_level: "X"
            os_patch_level: "lts"
            revision: "r1"
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Build Android 12 5.10
        run: |
          cd ./.github/workflows
          ARGS="--android android12 --kernel 5.10 --sub-level ${{ matrix.sub_level }} --os-patch ${{ matrix.os_patch_level }} --ksu-version ${{ env.KSU_VERSION }} --no-release"
          [ -n "${{ env.CUSTOM_VERSION }}" ] && ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          [ "${{ env.USE_ZRAM }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ env.USE_KPM }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ env.USE_BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ env.KSU_COMMIT }}" ] && ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          [ -n "${{ env.SUSFS_COMMIT }}" ] && ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          python3 build.py $ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-android12-5-10-${{ matrix.sub_level }}
          path: |
            *.zip
            *.img

  build-android13-5-10:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Build Android 13 5.10 LTS
        run: |
          cd ./.github/workflows
          ARGS="--android android13 --kernel 5.10 --sub-level X --os-patch lts --ksu-version ${{ env.KSU_VERSION }} --no-release"
          [ -n "${{ env.CUSTOM_VERSION }}" ] && ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          [ "${{ env.USE_ZRAM }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ env.USE_KPM }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ env.USE_BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ env.KSU_COMMIT }}" ] && ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          [ -n "${{ env.SUSFS_COMMIT }}" ] && ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          python3 build.py $ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-android13-5-10-X
          path: |
            *.zip
            *.img

  build-android13-5-15:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "74"
            os_patch_level: "2023-01"
          - sub_level: "123"
            os_patch_level: "2023-11"
          - sub_level: "148"
            os_patch_level: "2024-05"
          - sub_level: "170"
            os_patch_level: "2025-01"
          - sub_level: "178"
            os_patch_level: "2025-03"
          - sub_level: "180"
            os_patch_level: "2025-05"
          - sub_level: "189"
            os_patch_level: "2025-09"
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Build Android 13 5.15
        run: |
          cd ./.github/workflows
          ARGS="--android android13 --kernel 5.15 --sub-level ${{ matrix.sub_level }} --os-patch ${{ matrix.os_patch_level }} --ksu-version ${{ env.KSU_VERSION }} --no-release"
          [ -n "${{ env.CUSTOM_VERSION }}" ] && ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          [ "${{ env.USE_ZRAM }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ env.USE_KPM }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ env.USE_BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ env.KSU_COMMIT }}" ] && ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          [ -n "${{ env.SUSFS_COMMIT }}" ] && ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          python3 build.py $ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-android13-5-15-${{ matrix.sub_level }}
          path: |
            *.zip
            *.img

  build-android14-5-15:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Build Android 14 5.15 LTS
        run: |
          cd ./.github/workflows
          ARGS="--android android14 --kernel 5.15 --sub-level X --os-patch lts --ksu-version ${{ env.KSU_VERSION }} --no-release"
          [ -n "${{ env.CUSTOM_VERSION }}" ] && ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          [ "${{ env.USE_ZRAM }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ env.USE_KPM }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ env.USE_BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ env.KSU_COMMIT }}" ] && ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          [ -n "${{ env.SUSFS_COMMIT }}" ] && ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          python3 build.py $ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-android14-5-15-X
          path: |
            *.zip
            *.img

  build-android14-6-1:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "78"
            os_patch_level: "2024-06"
          - sub_level: "90"
            os_patch_level: "2024-08"
          - sub_level: "99"
            os_patch_level: "2024-10"
          - sub_level: "124"
            os_patch_level: "2025-02"
          - sub_level: "145"
            os_patch_level: "2025-09"
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Build Android 14 6.1
        run: |
          cd ./.github/workflows
          ARGS="--android android14 --kernel 6.1 --sub-level ${{ matrix.sub_level }} --os-patch ${{ matrix.os_patch_level }} --ksu-version ${{ env.KSU_VERSION }} --no-release"
          [ -n "${{ env.CUSTOM_VERSION }}" ] && ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          [ "${{ env.USE_ZRAM }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ env.USE_KPM }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ env.USE_BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ env.KSU_COMMIT }}" ] && ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          [ -n "${{ env.SUSFS_COMMIT }}" ] && ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          python3 build.py $ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-android14-6-1-${{ matrix.sub_level }}
          path: |
            *.zip
            *.img

  build-android15-6-6:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "50"
            os_patch_level: "2024-10"
          - sub_level: "66"
            os_patch_level: "2025-02"
          - sub_level: "102"
            os_patch_level: "2025-10"
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Build Android 15 6.6
        run: |
          cd ./.github/workflows
          ARGS="--android android15 --kernel 6.6 --sub-level ${{ matrix.sub_level }} --os-patch ${{ matrix.os_patch_level }} --ksu-version ${{ env.KSU_VERSION }} --no-release"
          [ -n "${{ env.CUSTOM_VERSION }}" ] && ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          [ "${{ env.USE_ZRAM }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ env.USE_KPM }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ env.USE_BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ env.KSU_COMMIT }}" ] && ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          [ -n "${{ env.SUSFS_COMMIT }}" ] && ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          python3 build.py $ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-android15-6-6-${{ matrix.sub_level }}
          path: |
            *.zip
            *.img

  release:
    needs: [build-android12-5-10, build-android13-5-10, build-android13-5-15, build-android14-5-15, build-android14-6-1, build-android15-6-6]
    if: ${{ github.event.inputs.make_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: '*_kernel-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          echo "=== Creating checksums ==="
          sha256sum * > SHA256SUMS.txt

      - name: Get SukiSU info
        run: |
          KSU_TAG=$(git ls-remote --tags https://github.com/SukiSU-Ultra/SukiSU-Ultra.git | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1 || echo "latest")
          KSU_COMMIT=$(git ls-remote https://github.com/SukiSU-Ultra/SukiSU-Ultra.git refs/heads/main | awk '{ print $1 }' | cut -c1-7)
          echo "KSU_TAG=$KSU_TAG" >> $GITHUB_ENV
          echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
          echo "RELEASE_NAME=GKI Kernel: SukiSU ($KSU_TAG) & SUSFS v2.1.0" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0-${{ github.run_number }}
          name: ${{ env.RELEASE_NAME }}
          draft: true
          files: |
            *AnyKernel3*.zip
            *.img
            SHA256SUMS.txt
          body: |
            ## GKI Kernel with SukiSU & SUSFS v2.1.0

            ### SukiSU Info
            - Tag: `${{ env.KSU_TAG }}`
            - Commit: `${{ env.KSU_COMMIT }}`

            ### Supported Configurations
            - Android 12 (Kernel 5.10)
            - Android 13 (Kernel 5.10, 5.15)
            - Android 14 (Kernel 5.15, 6.1)
            - Android 15 (Kernel 6.6)

            ### Features
            - SUSFS v2.1.0
            - Manual Syscall Hooks
            - Magic Mount Support
            - BBR Support
            - LZ4KD Support
