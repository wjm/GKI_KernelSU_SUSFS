name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'SukiSU 版本'
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
        default: Stable(标准)
      kernelsu_commit:
        description: '指定 SukiSU commit hash (可选，留空使用最新)'
        required: false
        type: string
        default: ''
      susfs_commit:
        description: '指定 SUSFS commit hash 或相对偏移 (如 HEAD~1)'
        required: false
        type: string
        default: ''
      use_zram:
        description: '启用 ZRAM (LZ4KD)'
        required: true
        type: boolean
        default: false
      use_kpm:
        description: '启用 KPM'
        required: true
        type: boolean
        default: true
      BBG:
        description: '启用 Baseband-guard'
        required: true
        type: boolean
        default: false
      make_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true
      custom_version:
        description: '自定义版本名称 (可选)'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.10'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.generate.outputs.matrix }}
      cache_version: ${{ steps.get_cache.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest cache version
        id: get_cache
        run: |
          cd ./.github/workflows/scripts
          python3 cache_manager.py get-version ${{ github.repository }}

      - name: Generate build matrix
        id: generate
        run: |
          cd ./.github/workflows/scripts
          python3 matrix_generator.py

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip xz-utils openssl
          pip install PyYAML

      - name: Setup AVB signing key
        env:
          BOOT_SIGN_KEY: ${{ secrets.BOOT_SIGN_KEY }}
        run: |
          mkdir -p toolchain/linux-x86/bin
          echo "$BOOT_SIGN_KEY" > toolchain/linux-x86/bin/testkey.pem
          echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/toolchain/linux-x86/bin/testkey.pem" >> $GITHUB_ENV

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          mkdir -p ~/.ccache
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Download build cache
        if: needs.prepare.outputs.cache_version != ''
        run: |
          cd ./.github/workflows/scripts
          python3 cache_manager.py download ${{ github.repository }}

      - name: Build kernel
        run: |
          cd ./.github/workflows/scripts

          ARGS="--android ${{ matrix.config.android }}"
          ARGS="$ARGS --kernel ${{ matrix.config.kernel }}"
          ARGS="$ARGS --sub-level ${{ matrix.config.sub_level }}"
          ARGS="$ARGS --os-patch ${{ matrix.config.os_patch }}"
          [ -n "${{ matrix.config.revision }}" ] && ARGS="$ARGS --revision ${{ matrix.config.revision }}"
          ARGS="$ARGS --ksu-version ${{ github.event.inputs.kernelsu_version }}"
          ARGS="$ARGS --no-release"

          [ "${{ github.event.inputs.use_zram }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ github.event.inputs.use_kpm }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ github.event.inputs.BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ github.event.inputs.kernelsu_commit }}" ] && ARGS="$ARGS --ksu-commit ${{ github.event.inputs.kernelsu_commit }}"
          [ -n "${{ github.event.inputs.susfs_commit }}" ] && ARGS="$ARGS --susfs-commit ${{ github.event.inputs.susfs_commit }}"
          [ -n "${{ github.event.inputs.custom_version }}" ] && ARGS="$ARGS --version ${{ github.event.inputs.custom_version }}"

          python3 build.py $ARGS

      - name: Save build cache
        run: |
          cd ./.github/workflows/scripts
          python3 cache_manager.py save

      - name: Upload build cache
        uses: actions/upload-artifact@v4
        with:
          name: build-cache-${{ strategy.job-index }}
          path: build-cache.tar.xz
          retention-days: 1

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          find /tmp/gki-build -name "*.zip" -type f -exec cp {} artifacts/ \;
          find /tmp/gki-build -name "*.img" -type f -exec cp {} artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}
          path: artifacts/*

  release:
    needs: [prepare, build]
    if: ${{ github.event.inputs.make_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: '*_kernel-*'
          merge-multiple: true

      - name: Download build cache
        uses: actions/download-artifact@v4
        with:
          pattern: 'build-cache-*'
          path: .
          merge-multiple: true

      - name: Merge build caches
        run: |
          mkdir -p ~/.ccache ~/.cache
          for cache in build-cache-*.tar.xz; do
            [ -f "$cache" ] && tar -xf "$cache" -C ~
          done
          tar -cJf build-cache.tar.xz -C ~ .ccache .cache 2>/dev/null || echo "No cache to merge"

      - name: Generate checksums
        run: |
          echo "=== Creating checksums ==="
          sha256sum * > SHA256SUMS.txt

      - name: Generate release body
        run: |
          cd ./.github/workflows/scripts
          python3 release_generator.py ../../../../all-artifacts/RELEASE_BODY.md
        working-directory: ${{ github.workspace }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0-${{ github.run_number }}
          name: GKI Kernel v2.1.0-${{ github.run_number }}
          draft: true
          files: |
            *AnyKernel3*.zip
            *.img
            SHA256SUMS.txt
            build-cache.tar.xz
          body_path: all-artifacts/RELEASE_BODY.md
