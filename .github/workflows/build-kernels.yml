name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'SukiSU 版本'
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
        default: Stable(标准)
      kernelsu_commit:
        description: '指定 SukiSU commit hash (可选，留空使用最新)'
        required: false
        type: string
        default: ''
      susfs_commit:
        description: '指定 SUSFS commit hash 或相对偏移 (如 HEAD~1)'
        required: false
        type: string
        default: ''
      use_zram:
        description: '启用 ZRAM (LZ4KD)'
        required: true
        type: boolean
        default: false
      use_kpm:
        description: '启用 KPM'
        required: true
        type: boolean
        default: true
      BBG:
        description: '启用 Baseband-guard'
        required: true
        type: boolean
        default: false
      make_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true
      custom_version:
        description: '自定义版本名称 (可选)'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.10'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate build matrix
        id: generate
        run: |
          pwd
          ls -la .github/workflows/
          python3 << 'PYEOF'
          import json
          import os

          matrix_path = '.github/workflows/matrix.json'
          print("Reading from:", matrix_path)
          print("Current dir:", os.getcwd())
          print("File exists:", os.path.exists(matrix_path))

          with open(matrix_path, 'r') as f:
              matrix = json.load(f)

          builds = []
          for key, configs in matrix.items():
              android, kernel = key.split('-')
              for cfg in configs:
                  build = {
                      "android": android,
                      "kernel": kernel,
                      "sub_level": cfg["sub_level"],
                      "os_patch": cfg["os_patch_level"],
                  }
                  if "revision" in cfg:
                      build["revision"] = cfg["revision"]
                  builds.append(build)

          output = 'matrix=' + json.dumps(builds)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(output + '\n')
          print("Matrix generated:", len(builds), "builds")
          PYEOF

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}-ccache-

      - name: Build kernel
        run: |
          cd ./.github/workflows

          ARGS="--android ${{ matrix.config.android }}"
          ARGS="$ARGS --kernel ${{ matrix.config.kernel }}"
          ARGS="$ARGS --sub-level ${{ matrix.config.sub_level }}"
          ARGS="$ARGS --os-patch ${{ matrix.config.os_patch }}"
          [ -n "${{ matrix.config.revision }}" ] && ARGS="$ARGS --revision ${{ matrix.config.revision }}"
          ARGS="$ARGS --ksu-version ${{ github.event.inputs.kernelsu_version }}"
          ARGS="$ARGS --no-release"

          [ "${{ github.event.inputs.use_zram }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ github.event.inputs.use_kpm }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ github.event.inputs.BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ -n "${{ github.event.inputs.kernelsu_commit }}" ] && ARGS="$ARGS --ksu-commit ${{ github.event.inputs.kernelsu_commit }}"
          [ -n "${{ github.event.inputs.susfs_commit }}" ] && ARGS="$ARGS --susfs-commit ${{ github.event.inputs.susfs_commit }}"
          [ -n "${{ github.event.inputs.custom_version }}" ] && ARGS="$ARGS --version ${{ github.event.inputs.custom_version }}"

          python3 build.py $ARGS

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          find . -name "*.zip" -type f -exec cp {} artifacts/ \;
          find . -name "*.img" -type f -exec cp {} artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}
          path: artifacts/*

  release:
    needs: build
    if: ${{ github.event.inputs.make_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: '*_kernel-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          echo "=== Creating checksums ==="
          sha256sum * > SHA256SUMS.txt

      - name: Generate release body
        run: |
          python3 << 'PYEOF'
          import json
          import urllib.request
          import ssl

          with open('.github/workflows/matrix.json', 'r') as f:
              matrix = json.load(f)

          configs = []
          for key in sorted(matrix.keys()):
              android, kernel = key.split('-')
              version = android.replace('android', '')
              configs.append("- Android " + version + " (Kernel " + kernel + ")")

          ssl_context = ssl.create_default_context()
          ssl_context.check_hostname = False
          ssl_context.verify_mode = ssl.CERT_NONE

          ksu_tag = "latest"
          ksu_commit = "unknown"

          try:
              tags_url = "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/git/refs/tags"
              req = urllib.request.Request(tags_url, headers={'User-Agent': 'Python'})
              with urllib.request.urlopen(req, context=ssl_context) as response:
                  tags = json.loads(response.read())
                  if tags:
                      ksu_tag = tags[-1]['ref'].split('/')[-1]
          except:
              pass

          try:
              commits_url = "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/git/ref/heads/main"
              req = urllib.request.Request(commits_url, headers={'User-Agent': 'Python'})
              with urllib.request.urlopen(req, context=ssl_context) as response:
                  ref = json.loads(response.read())
                  ksu_commit = ref['object']['sha'][:7]
          except:
              pass

          lines = [
              "## GKI Kernel with SukiSU & SUSFS v2.1.0",
              "",
              "### SukiSU Info",
              "- Tag: `" + ksu_tag + "`",
              "- Commit: `" + ksu_commit + "`",
              "",
              "### Supported Configurations",
          ]
          lines.extend(configs)
          lines.extend([
              "",
              "### Features",
              "- SUSFS v2.1.0",
              "- Manual Syscall Hooks",
              "- Magic Mount Support",
              "- BBR Support",
              "- LZ4KD Support",
          ])

          with open('RELEASE_BODY.md', 'w') as f:
              f.write('\n'.join(lines))
          PYEOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0-${{ github.run_number }}
          name: GKI Kernel v2.1.0-${{ github.run_number }}
          draft: true
          files: |
            *AnyKernel3*.zip
            *.img
            SHA256SUMS.txt
          body_path: RELEASE_BODY.md
